apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headmaster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "headmaster.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "headmaster.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "headmaster.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "headmaster.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: headmaster
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            - name: HEADSCALE_IMAGE
              value: {{ .Values.headscaleImage | quote }}
            - name: PROXY_IMAGE
              value: {{ .Values.proxyImage | quote }}
            - name: RUST_LOG
              value: {{ .Values.rustLog }}
            - name: INGRESS_ENABLED
              value: "{{ if .Values.ingress.enabled }}true{{ else }}false{{ end }}"
            {{- if .Values.ingress.watchNamespaces }}
            - name: INGRESS_WATCH_NAMESPACES
              value: {{ .Values.ingress.watchNamespaces | join "," | quote }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: WEBHOOK_TLS_DIR
              value: /etc/headmaster/webhook-tls
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: health
              containerPort: 8080
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: 9443
            {{- end }}
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-tls
              mountPath: /etc/headmaster/webhook-tls
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ include "headmaster.fullname" . }}-webhook-tls
      {{- end }}
