apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "headmaster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "headmaster.labels" . | nindent 4 }}
rules:
  - apiGroups: [headmaster.potatonode.github.io]
    resources: [headscaleinstances]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [headmaster.potatonode.github.io]
    resources: [headscaleinstances/status]
    verbs: [get, patch, update]
  - apiGroups: [""]
    resources: [configmaps, secrets, serviceaccounts]
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, patch, update, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [get, create]
  - apiGroups: ["", events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  {{- if .Values.webhook.enabled }}
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, create, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  {{- end }}
