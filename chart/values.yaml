# Map of HeadscaleInstance resources to create. Keys are resource names.
headscaleInstances: {}

headscaleImage:
  repository: ghcr.io/juanfont/headscale
  tag: v0.29.0-beta.2

proxyImage:
  repository: tailscale/tailscale
  tag: v1.98.4

image:
  repository: ghcr.io/potatonode/headmaster
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Ingress controller configuration.
ingress:
  # Set to false to disable the Ingress controller entirely (e.g. when using
  # headmaster only to manage HeadscaleInstance lifecycles).
  enabled: true
  # Namespaces to watch for Ingress objects. Empty list means all namespaces.
  watchNamespaces: []

# Admission webhook for HeadscaleInstance config validation.
# Requires cert-manager to be installed in the cluster.
webhook:
  enabled: false

rustLog: info

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi
