# Map of HeadscaleInstance resources to create. Keys are resource names.
headscaleInstances: {}

headscaleImage:
  repository: headscale/headscale
  tag: v0.29.2

proxyImage:
  repository: tailscale/tailscale
  tag: v1.98.9

image:
  repository: ghcr.io/potatonode/headmaster
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Ingress controller configuration.
ingress:
  # Set to false to disable the Ingress controller entirely (e.g. when using
  # headmaster only to manage HeadscaleInstance lifecycles).
  enabled: true

# Controls default-handler ownership for Ingresses with no explicit
# headscale-namespace annotation.
#   null (default) — take ownership if unclaimed; gracefully back off if
#                    another deployment already holds it.
#   true           — forcibly take ownership, overwriting any stale claim.
#                    Use when intentionally migrating the default handler.
#   false          — do not claim default ownership; only process Ingresses
#                    that explicitly target this deployment.
claimDefault: ~

# Admission webhook for HeadscaleInstance config validation.
# Requires cert-manager to be installed in the cluster.
webhook:
  enabled: false

rustLog: info

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi
