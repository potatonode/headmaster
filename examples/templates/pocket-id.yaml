{{- $existing := lookup "v1" "Secret" .Release.Namespace "pocket-id-encryption-key" }}
{{- $encKey := $existing | dig "data" "key" "" | b64dec }}
{{- if not $encKey }}{{- $encKey = randAlphaNum 32 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: pocket-id-encryption-key
  namespace: {{ .Release.Namespace }}
stringData:
  key: {{ $encKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: pocket-id-static-api-key
  namespace: {{ .Release.Namespace }}
stringData:
  token: {{ .Values.pocketId.apiKey | quote }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocket-id
  namespace: {{ .Release.Namespace }}
spec:
  rules:
    - host: {{ index .Values "pocket-id-operator" "instance" "spec" "appUrl" | trimPrefix "http://" | trimPrefix "https://" | splitList "/" | first }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocket-id
                port:
                  number: 1411
