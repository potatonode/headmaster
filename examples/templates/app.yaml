apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.app.namespace }}
---
# hello-world: a whoami service exposed on the tailnet for e2e connectivity tests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: {{ .Values.app.namespace }}
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: {{ .Values.app.namespace }}
spec:
  selector:
    app: hello-world
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world
  namespace: {{ .Values.app.namespace }}
  annotations:
    headmaster.potatonode.github.io/config: |-
      {
        "headscale-ref": "main",
        "managed-key-tags": ["tag:server"],
        "access": [
          {
            "from": ["group:users"],
            "capabilities": {
              "example.com/cap/role": [{ "role": "viewer" }]
            }
          }
        ]
      }
spec:
  ingressClassName: headmaster
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-world
                port:
                  number: 80
