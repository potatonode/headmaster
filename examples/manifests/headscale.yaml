# Replace <HEADSCALE_HOSTNAME> with the hostname from your serverUrl
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main
  namespace: headmaster-system   # replace with your namespace
spec:
  rules:
    - host: <HEADSCALE_HOSTNAME>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headscale-server-main
                port:
                  name: http
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: headmaster
  namespace: headmaster-system   # replace with your namespace
spec:
  clientID: headmaster
  name: Headmaster
  callbackUrls:
    - "https://<HEADSCALE_HOSTNAME>/oidc/callback"
  logo:
    autoGenerate: false
  scim:
    endpoint: "http://headscale-scim-main.headmaster-system.svc:8081/scim/v2"
    tokenSecretRef:
      name: headscale-scim-token-main
      key: SCIM_BEARER_TOKEN
