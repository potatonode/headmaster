name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-image:
    name: Build image (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/potatonode/headmaster:${{ github.ref_name }}-${{ matrix.arch }}

  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            --tag ghcr.io/potatonode/headmaster:${{ github.ref_name }} \
            --tag ghcr.io/potatonode/headmaster:${VERSION} \
            --tag ghcr.io/potatonode/headmaster:latest \
            ghcr.io/potatonode/headmaster:${{ github.ref_name }}-amd64 \
            ghcr.io/potatonode/headmaster:${{ github.ref_name }}-arm64

  chart:
    name: Release Helm chart
    runs-on: ubuntu-latest
    needs: merge-manifest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package chart/ --version "$VERSION" --app-version "$VERSION"
          helm push "headmaster-${VERSION}.tgz" oci://ghcr.io/potatonode/charts

      - name: Attach chart to GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${{ github.ref_name }}" "headmaster-${VERSION}.tgz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
