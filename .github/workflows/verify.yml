name: verify

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: lint

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - uses: azure/setup-helm@v5

      - run: task lint

  test-unit:
    name: Unit tests (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-unit-${{ matrix.arch }}

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - run: task test-unit

  test-unit-ok:
    name: Unit tests
    needs: test-unit
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          result="${{ needs.test-unit.result }}"
          [[ "$result" == "success" ]] || exit 1

  test-functional:
    name: Functional tests (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-functional-${{ matrix.arch }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Install libclang
        run: sudo apt-get install -y libclang-dev

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - run: task test-functional

  test-functional-ok:
    name: Functional tests
    needs: test-functional
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          result="${{ needs.test-functional.result }}"
          [[ "$result" == "success" ]] || exit 1

  test-e2e:
    name: E2E tests (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-e2e-${{ matrix.arch }}

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install k3d
        run: |
          curl -sL "https://github.com/k3d-io/k3d/releases/download/v5.9.0/k3d-linux-${{ matrix.arch }}" \
            -o /usr/local/bin/k3d && chmod +x /usr/local/bin/k3d

      - uses: azure/setup-helm@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        run: docker buildx create --use --driver docker-container --name ci-builder

      - run: task test-e2e
        env:
          CACHE_ARGS: >-
            --cache-from type=registry,ref=ghcr.io/potatonode/headmaster:buildcache-${{ matrix.arch }}
            --cache-to type=registry,ref=ghcr.io/potatonode/headmaster:buildcache-${{ matrix.arch }},mode=max

  test-e2e-ok:
    name: E2E tests
    needs: test-e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          result="${{ needs.test-e2e.result }}"
          [[ "$result" == "success" ]] || exit 1

  test-release-please:
    name: Release please (dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release-please version from action
        id: rp-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          action_ref=$(grep -m1 'release-please-action@' .github/workflows/release-please.yml | sed 's/.*@//')
          version=$(gh api "repos/googleapis/release-please-action/contents/package.json?ref=${action_ref}" \
            --jq '.content' | base64 -d | jq -r '.dependencies["release-please"]' | tr -d '^~')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Dry run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx release-please@${{ steps.rp-version.outputs.version }} release-pr \
            --token="${GH_TOKEN}" \
            --repo-url=${{ github.repository }} \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json \
            --target-branch=${{ github.head_ref || github.ref_name }} \
            --local \
            --local-path=. \
            --dry-run
