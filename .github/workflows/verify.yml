name: verify

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: lint

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - uses: azure/setup-helm@v5

      - run: task lint

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-unit

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - run: task test-unit

  test-functional:
    name: Functional tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-functional

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Install libclang
        run: sudo apt-get install -y libclang-dev

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - run: task test-functional

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          prefix-key: test-e2e

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install k3d
        run: |
          curl -sL https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64 \
            -o /usr/local/bin/k3d && chmod +x /usr/local/bin/k3d

      - uses: azure/setup-helm@v5

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --driver docker-container \
            --driver-opt "env.ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" \
            --driver-opt "env.ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" \
            --name ci-builder

      - run: task test-e2e
        env:
          CACHE_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"
