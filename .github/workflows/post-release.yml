name: post-release

# After each release tag, bumps Cargo.toml and Chart.yaml to a -next suffix
# version and pushes the commit directly to main, bypassing branch protection.
#
# GitHub has no service account concept — its narrowest non-human identity
# primitive is a GitHub App. The headmaster-release-bump app (visible under
# Settings → Developer settings → GitHub Apps) exists solely to serve as that
# identity: it has no webhook, no OAuth flow, and no behaviour of its own. Its
# installation ID is registered as a bypass actor in .github/rulesets/main.json,
# which lets any push made with its token skip the PR and status-check rules.
# Using a dedicated app instead of the default GITHUB_TOKEN (which is issued by
# the global GitHub Actions app) means the bypass is scoped to workflows that
# explicitly hold the app credentials — nothing else can bypass.
#
# Two repo secrets are required:
#   BUMP_APP_ID          — the App ID shown on the app's settings page
#   BUMP_APP_PRIVATE_KEY — a private key generated on the app's settings page

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  bump-next:
    name: Bump to next suffix version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.BUMP_APP_ID }}
          private-key: ${{ secrets.BUMP_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Calculate next version
        id: next
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}-next" >> "$GITHUB_OUTPUT"

      - name: Bump Cargo.toml
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$NEXT\"/" Cargo.toml

      - name: Bump Chart.yaml
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version: .*/version: $NEXT/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEXT\"/" chart/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml chart/Chart.yaml
          git commit -m "chore: mark ${{ steps.next.outputs.version }}"
          git push origin main
